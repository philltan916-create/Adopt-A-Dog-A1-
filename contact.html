<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - AdoptADog</title>
  <link rel="stylesheet" href="ADStyle.css">
</head>

<body>

<section class="hero">
  <div class="overlay">
    <div class="hero-content container">

      <div class="hero-left">

        <div class="logo">
          <img src="images/logo.png" alt="AdoptADog Logo">

          <div>
            <h1>ADOPTADOG</h1>
            <p class="tagline">Seattle's premiere dog adoption agency</p>
          </div>

        </div>

      </div>

      <div class="hero-right">
        <p class="cart">$1234.56</p>
        <button class="checkout-btn">Checkout</button>
      </div>

    </div>
  </div>
</section>

<div class="breadcrumb">
  <div class="container">
    <a href="index.html">Home</a> /
    <a href="dogs.html">Dogs</a> /
    <a href="blog.html">Blog</a> /
    <a href="contact.html">Contact</a>
  </div>
</div>

<section class="container contact-page">

  <h2 class="page-title">Contact Us</h2>

  <form class="contact-form">

    <label for="name">Full Name</label>
    <input type="text" id="name" required>

    <label for="email">Email Address</label>
    <input type="email" id="email" required>

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone">

    <label for="topic">Reason for Contact</label>
    <select id="topic">
      <option>Adoption Question</option>
      <option>Volunteer Information</option>
      <option>General Inquiry</option>
    </select>

    <label>Have you adopted before?</label>

    <div class="radio-group">
      <label><input type="radio" name="adopted"> Yes</label>
      <label><input type="radio" name="adopted"> No</label>
    </div>

    <label for="message">Message</label>
    <textarea id="message" rows="6"></textarea>

    <div class="checkbox-group">
      <label>
        <input type="checkbox">
        Subscribe to our newsletter
      </label>
    </div>

    <button type="submit" class="submit-btn">
      Send Message
    </button>

  </form>

</section>

<footer>

  </div>

  <p> 2018 Adoptadog, LLC | Seattle, WA</p>
</footer>

</body>
</html>
